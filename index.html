<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kiko</title>
    <link rel="stylesheet" href="styles/main.css">
</head>
<body>
    <div id="initialInput" class="modal-overlay active">
    <div class="modal-content">
        <h2>Forneça os identificadores</h2>
        
        <input type="text" id="originalInput" placeholder="Original" required>
        <input type="text" id="replayInput" placeholder="Replay" required>
        <button type="submit" class="login-btn" onclick="toggleModal()">Confirmar</button>
    </div>
    </div>

    <div id="header"></div>
    <div id="content">
        <div id="sidebar">
            <div id="sidebar-header">
                <span id="not-replayed" class="" onclick="selectNotReplayed()">Não<br>Repetido</span>
                <span id="same-response" class="" onclick="selectSameResponse()">Respostas<br>Iguais</span>
                <span id="different-responses" class="" onclick="selectDifferentResponses()">Respostas<br>Diferentes</span>

                <!-- <span class="clean-button selected">Não Repetido</span>
                <span class="clean-button">Iguais</span>
                <span class="clean-button">Diferentes</span> -->
            </div>

            <div id="urls">
                <div class="url status-a" id="flow-1" onclick='selectUrl("flow-1")'>
                    <input type="checkbox" class="true-positive-check" checked disabled>
                    <span class="http-verb http-get">GET</span>
                    <span class="url-text truncate">abc.intranet.bb.com.br</span>
                </div>

                <div class="url status-b" id="url-1" onclick='selectUrl("url-1")'>
                    <span class="status-button"></span>
                    <span class="http-verb http-post">POST</span>
                    <span class="url-text truncate">bb.com.br.adada.fdafa</span>
                </div>

                <div class="url status-c" id="url-2" onclick='selectUrl("url-2")'>
                    <span class="status-button"></span>
                    <span class="http-verb http-put">PUT</span>
                    <span class="url-text truncate">bb.com.br</span>
                </div>

                <div class="url status-a" id="url-3" onclick='selectUrl("url-3")'>
                    <span class="status-button"></span>
                    <span class="http-verb http-delete">DELETE</span>
                    <span class="url-text truncate">bb.com.br</span>
                </div>

                <div class="url status-b" id="url-4" onclick='selectUrl("url-4")'>
                    <span class="status-button"></span>
                    <span class="http-verb http-patch">PATCH</span>
                    <span class="url-text truncate">bb.com.br</span>
                </div>

            </div>

            <div id="sidebar-footer">
                b3
            </div>
        </div>
        
        <div id="responses">
            <div id="original-response">
                <div class="response-menu">
                    <span class="menu-name">Original</span>
                    <span id="original-menu-url" class="menu-url none" title=""></span>
                    <div class="response-menu-buttons">
                        <span id="original-response-button" class="button" onclick="showOriginalResponse()">Response</span>
                        <span id="original-raw-request-button" class="button" onclick="showOriginalRawRequest()">Raw Request</span>
                        <span id="original-raw-response-button" class="button" onclick="showOriginalRawResponse()">Raw Response</span>
                    </div>
                </div>
                <div class="response-content" id="original-response-content">
                    <iframe id="original-reponse" class="none" srcdoc='<!doctype html><html lang="en"><head><title>Example Domain</title><meta name="viewport" content="width=device-width, initial-scale=1"><style>body{background:#eee;width:60vw;margin:15vh auto;font-family:system-ui,sans-serif}h1{font-size:1.5em}div{opacity:0.8}a:link,a:visited{color:#348}</style></head><body><div><h1>Example Domain</h1><p>This domain is for use in documentation examples without needing permission. Avoid use in operations.</p><p><a href="https://iana.org/domains/example">Learn more</a></p></div></body></html>'></iframe>

                </div>
            </div>

            <div id="replay-response">
                <div class="response-menu">
                    <span id="replay-button" class="menu-name">Repetir</span>
                    <span id="replay-menu-url" class="menu-url none" title=""></span>
                    <div class="response-menu-buttons">
                        <span class="button">Response</span>
                        <span class="button">Raw Request</span>
                        <span class="button">Raw Response</span>
                    </div>
                </div>
                <div class="response-content" id="replay-response-content">
                </div>
            </div>
        </div>
    </div>

    <script src="scripts/app.js"></script>
</body>
</html>
